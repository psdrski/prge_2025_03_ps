name: build, push and deploy
on:
  push:
    branches:
      - qa
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build & push
    runs-on:
      - self-hosted

    environment: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v3

      - name: building and setting up docker-compose

        env:
          # DB
          ENV_NAME: ${{ github.ref_name }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # GEOSERVER
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          GEOSERVER_PORT: ${{ secrets.GEOSERVER_PORT }}
          # FASTAPI
          FASTAPI_PORT: ${{ secrets.FASTAPI_PORT }}

        run:
          docker-compose -f ./docker-compose/docker-compose-prge-remote.yml -p remote-prge_2025_03_ps-${{ github.ref_name }} up --build -d
