x-enviroment:
  - &env-postgres-db POSTGRES_DB=${POSTGRES_DB}
  - &env-postgres-user POSTGRES_USER=${POSTGRES_USER}
  - &env-postgres-password POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

services:
  postgis:
    build:
      context: ..
      dockerfile: docker/postgis/Dockerfile
    image: 'prge_2025_03_ps_postgis'
    container_name: prge-2025-03-ps-postgis-${ENV_NAME}
    environment:
      - *env-postgres-db
      - *env-postgres-user
      - *env-postgres-password
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgis-prge-data:/var/lib/postgresql/data

  geoserver:
      build:
        context: ..
        dockerfile: docker/geoserver/Dockerfile
      image: 'prge_2025_03_ps_geoserver'
      container_name: 'prge_2025_03_ps_geoserver'
      environment:
        GEOSERVER_DATA_DIR: /opt/geoserver_data
        SKIP_DEMO_DATA: "true"
      ports:
        - ${GEOSERVER_PORT}:8080
      volumes:
        - geoserver-data:/opt/geoserver_data






volumes:
  postgis-prge-data:
  geoserver-data: